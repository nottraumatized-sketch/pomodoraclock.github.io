<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <style>
    body {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      height:100vh; background:linear-gradient(135deg,#1e1e1e,#2c2c2c);
      font-family:sans-serif; color:#00aaff;
    }
    svg { transform:rotate(-90deg); }
    circle { fill:none; stroke-width:12; }
    #bg { stroke:#333; }
    #progress { stroke:#a64dff; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
    #time { position:absolute; font-size:2.5em; font-weight:bold; color:#00aaff; }
    .controls { margin-top:20px; }
    button {
      margin:5px; padding:8px 12px; font-size:2em; cursor:pointer;
      border:none; background:none; color:#00aaff;
    }
    button:hover { color:#a64dff; }
    input {
      width:60px; text-align:center; margin-left:5px;
      background:#222; color:#fff; border:none; border-radius:4px;
    }
  </style>
</head>
<body>
  <div style="position:relative; width:300px; height:300px;">
    <svg width="300" height="300">
      <circle id="bg" cx="150" cy="150" r="130"/>
      <circle id="progress" cx="150" cy="150" r="130"/>
    </svg>
    <div id="time" style="top:40%; left:50%; transform:translate(-50%,-50%);">25:00</div>
    <div style="position:absolute; bottom:30%; left:50%; transform:translateX(-50%);">
      <button id="playPauseBtn" onclick="toggleTimer()">▶</button>
      <button onclick="resetTimer()">⏹</button>
    </div>
  </div>

  <div class="controls">
    <label>Min: <input type="number" id="minutesInput" value="25" min="1"></label>
  </div>

  <script>
    let duration = 25 * 60;
    let remaining = duration;
    let timer = null;
    const progress = document.getElementById("progress");
    const timeDisplay = document.getElementById("time");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const circumference = 2 * Math.PI * 130;
    progress.style.strokeDasharray = circumference;

    function updateDisplay() {
      let minutes = Math.floor(remaining / 60);
      let seconds = remaining % 60;
      timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2,"0")}`;
      let offset = circumference - (remaining / duration) * circumference;
      progress.style.strokeDashoffset = offset;
    }

    function tick() {
      if (remaining > 0) {
        remaining--;
        updateDisplay();
      } else {
        playSound();
        clearInterval(timer);
        timer = null;
        playPauseBtn.textContent = "▶";
      }
    }

    function toggleTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        playPauseBtn.textContent = "▶";
      } else {
        timer = setInterval(tick, 1000);
        playPauseBtn.textContent = "⏸";
      }
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      playPauseBtn.textContent = "▶";
      let minutes = parseInt(document.getElementById("minutesInput").value) || 25;
      duration = minutes * 60;
      remaining = duration;
      updateDisplay();
    }

    function playSound() {
      let alarm = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
      alarm.play().catch(e => console.log("Audio blocked, user interaction needed"));
    }

    // Auto-update when minutes input changes
    document.getElementById("minutesInput").addEventListener("input", () => {
      let minutes = parseInt(document.getElementById("minutesInput").value) || 25;
      duration = minutes * 60;
      remaining = duration;
      updateDisplay();
    });

    resetTimer(); // initialize
  </script>
</body>
</html>
