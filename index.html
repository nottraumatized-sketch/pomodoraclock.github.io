<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Pomodoro Timer</title>
  <style>
    html, body {
      margin:0;
      padding:0;
      height:100%;
      overflow:hidden; /* no scroll bar */
    }
    body {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      height:100%; background:#000000; /* pure black */
      font-family:sans-serif; color:#00aaff;
    }
    .timer-container {
      position:relative;
      width:90vmin; /* scales with viewport */
      height:90vmin;
      max-width:500px; /* optional cap */
      max-height:500px;
    }
    svg { width:100%; height:100%; transform:rotate(-90deg); }
    circle { fill:none; stroke-width:4%; } /* stroke scales with size */
    #bg { stroke:#222; }
    #progress {
      stroke:#a64dff;
      stroke-linecap:round;
      transition:stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 12px #a64dff); /* glow effect */
    }
    #time {
      position:absolute;
      top:40%; left:50%;
      transform:translate(-50%,-50%);
      font-size:8vmin; /* scales with viewport */
      font-weight:bold; color:#00aaff;
    }
    .button-group {
      position:absolute;
      bottom:25%; left:50%;
      transform:translateX(-50%);
    }
    button {
      margin:5px; padding:8px 12px;
      font-size:6vmin; /* scales with viewport */
      cursor:pointer; border:none; background:none; color:#00aaff;
    }
    button:hover { color:#a64dff; }
    .controls {
      margin-top:15px;
    }
    input {
      width:70px; text-align:center; margin-left:5px;
      background:#111; color:#fff; border:none; border-radius:4px;
      font-size:1em;
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <circle id="bg" cx="50" cy="50" r="45"/>
      <circle id="progress" cx="50" cy="50" r="45"/>
    </svg>
    <div id="time">25:00</div>
    <div class="button-group">
      <button id="playPauseBtn" onclick="toggleTimer()">▶</button>
      <button onclick="resetTimer()">⏹</button>
    </div>
  </div>

  <div class="controls">
    <label>Min: <input type="number" id="minutesInput" value="25" min="1"></label>
  </div>

  <script>
    let duration = 25 * 60;
    let remaining = duration;
    let timer = null;
    const progress = document.getElementById("progress");
    const timeDisplay = document.getElementById("time");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const circumference = 2 * Math.PI * 45;
    progress.style.strokeDasharray = circumference;

    function updateDisplay() {
      let minutes = Math.floor(remaining / 60);
      let seconds = remaining % 60;
      timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2,"0")}`;
      let offset = circumference - (remaining / duration) * circumference;
      progress.style.strokeDashoffset = offset;
    }

    function tick() {
      if (remaining > 0) {
        remaining--;
        updateDisplay();
      } else {
        playSound();
        clearInterval(timer);
        timer = null;
        playPauseBtn.textContent = "▶";
      }
    }

    function toggleTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        playPauseBtn.textContent = "▶";
      } else {
        timer = setInterval(tick, 1000);
        playPauseBtn.textContent = "⏸";
      }
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      playPauseBtn.textContent = "▶";
      let minutes = parseInt(document.getElementById("minutesInput").value) || 25;
      duration = minutes * 60;
      remaining = duration;
      updateDisplay();
    }

    function playSound() {
      let alarm = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
      alarm.play().catch(e => console.log("Audio blocked, user interaction needed"));
    }

    // Auto-update when minutes input changes
    document.getElementById("minutesInput").addEventListener("input", () => {
      let minutes = parseInt(document.getElementById("minutesInput").value) || 25;
      duration = minutes * 60;
      remaining = duration;
      updateDisplay();
    });

    resetTimer(); // initialize
  </script>
</body>
</html>
