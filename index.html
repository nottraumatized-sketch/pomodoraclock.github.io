<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <style>
    body {
      margin:0; padding:0; height:100%;
      display:flex; justify-content:center; align-items:center;
      background:#191919; color:#00aaff; font-family:sans-serif;
    }
    .timer-container { position:relative; width:300px; height:300px; }
    svg { width:100%; height:100%; transform:rotate(-90deg); }
    circle { fill:none; stroke-width:10; }
    #progress { stroke:#a64dff; stroke-linecap:round; filter:drop-shadow(0 0 10px #a64dff); }
    #time {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:2em; font-weight:bold;
    }
    .flash { animation: flash 1s infinite; }
    @keyframes flash {
      0% { color:#00aaff; }
      50% { color:#ff4444; }
      100% { color:#00aaff; }
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <svg viewBox="0 0 100 100">
      <circle id="progress" cx="50" cy="50" r="45"/>
    </svg>
    <div id="time">25:00</div>
  </div>
  <button onclick="toggleTimer()">▶</button>
  <button onclick="resetTimer()">⏹</button>

  <script>
    let duration = 25*60, remaining = duration, timer=null;
    const timeDisplay=document.getElementById("time");
    const progress=document.getElementById("progress");
    const circumference=2*Math.PI*45;
    progress.style.strokeDasharray=circumference;

    function updateDisplay(){
      let m=Math.floor(remaining/60), s=remaining%60;
      timeDisplay.textContent=`${m}:${s.toString().padStart(2,"0")}`;
      let offset=circumference-(remaining/duration)*circumference;
      progress.style.strokeDashoffset=offset;
    }

    function tick(){
      if(remaining>0){ remaining--; updateDisplay(); }
      else { playSound(); timeDisplay.classList.add("flash"); clearInterval(timer); timer=null; }
    }

    function toggleTimer(){
      if(timer){ clearInterval(timer); timer=null; }
      else { timer=setInterval(tick,1000); }
    }

    function resetTimer(){
      clearInterval(timer); timer=null;
      remaining=duration; updateDisplay();
      timeDisplay.classList.remove("flash");
    }

    function playSound(){
      let alarm=new Audio("https://raw.githubusercontent.com/nottraumatized-sketch/pomodoraclock.github.io/refs/heads/main/f1%20radio.mp3");
      alarm.play().catch(e=>console.log("Audio blocked"));
    }

    updateDisplay();
  </script>
</body>
</html>
