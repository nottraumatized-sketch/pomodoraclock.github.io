<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compact Pomodoro Timer</title>
  <style>
    body { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg, #f5f5f5, #ffe0e0);
; font-family:sans-serif; }
    svg { transform:rotate(-90deg); }
    circle { fill:none; stroke-width:10; }
    #bg { stroke:#ddd; }
    #progress { stroke:#ff4d4d; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
    #time { position:absolute; font-size:1.5em; font-weight:bold; }
    .controls { margin-top:15px; }
    button { margin:3px; padding:6px 10px; font-size:0.9em; cursor:pointer; }
    input { width:40px; text-align:center; margin-left:5px; }
  </style>
</head>
<body>
  <div style="position:relative; width:150px; height:150px;">
    <svg width="150" height="150">
      <circle id="bg" cx="75" cy="75" r="65"/>
      <circle id="progress" cx="75" cy="75" r="65"/>
    </svg>
    <div id="time" style="top:50%; left:50%; transform:translate(-50%,-50%);">25:00</div>
  </div>

  <div class="controls">
    <button onclick="startTimer()">▶ Play</button>
    <button onclick="pauseTimer()">⏸ Pause</button>
    <button onclick="resetTimer()">⏹ Reset</button>
    <label>Min: <input type="number" id="minutesInput" value="25" min="1"></label>
  </div>

  <script>
    let duration = 25 * 60;
    let remaining = duration;
    let timer = null;
    const progress = document.getElementById("progress");
    const timeDisplay = document.getElementById("time");
    const circumference = 2 * Math.PI * 65;
    progress.style.strokeDasharray = circumference;

    function updateDisplay() {
      let minutes = Math.floor(remaining / 60);
      let seconds = remaining % 60;
      timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2,"0")}`;
      let offset = circumference - (remaining / duration) * circumference;
      progress.style.strokeDashoffset = offset;
    }

    function tick() {
      if (remaining > 0) {
        remaining--;
        updateDisplay();
      } else {
        let alarm = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        alarm.play().catch(e => console.log("Audio blocked, user interaction needed"));
        clearInterval(timer);
      }
    }

    function startTimer() {
      if (!timer) timer = setInterval(tick, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      let minutes = parseInt(document.getElementById("minutesInput").value) || 25;
      duration = minutes * 60;
      remaining = duration;
      updateDisplay();
    }

    resetTimer(); // initialize
  </script>
</body>
</html>
