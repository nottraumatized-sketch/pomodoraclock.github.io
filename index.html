<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer (Solid Arc)</title>
  <style>
    html, body {
      margin:0;
      padding:0;
      height:100%;
      overflow:hidden;
      background:#191919;
    }
    body {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      font-family:sans-serif; color:#00aaff;
    }

    .timer-container {
      position:relative;
      width:90vmin; height:90vmin;
      max-width:500px; max-height:500px;
    }

    svg { width:100%; height:100%; transform:rotate(-90deg); }
    circle { fill:none; stroke-width:4%; }
    #bg { stroke:transparent; }
    #progress {
      stroke:#a64dff;
      stroke-linecap:round;
      transition:stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 20px #a64dff);
    }

    #time {
      position:absolute;
      top:40%; left:50%;
      transform:translate(-50%,-50%);
      font-size:8vmin;
      font-weight:bold; color:#00aaff;
    }

    .button-group {
      position:absolute;
      bottom:25%; left:50%;
      transform:translateX(-50%);
    }

    button {
      margin:5px; padding:8px 12px;
      font-size:6vmin;
      cursor:pointer; border:none; background:none; color:#00aaff;
    }
    button:hover { color:#a64dff; }

    .controls { margin-top:15px; }
    input {
      width:70px; text-align:center; margin-left:5px;
      background:#111; color:#fff; border:none; border-radius:4px;
      font-size:1em;
    }

    /* Flashing effect for text and ring */
    .flash {
      animation: flashText 1s infinite;
    }
    @keyframes flashText {
      0% { color:#00aaff; }
      50% { color:#ff4444; }
      100% { color:#00aaff; }
    }

    .ring-flash {
      animation: flashRing 1s infinite;
    }
    @keyframes flashRing {
      0% { stroke:#a64dff; filter: drop-shadow(0 0 20px #a64dff); }
      50% { stroke:#ff4444; filter: drop-shadow(0 0 20px #ff4444); }
      100% { stroke:#a64dff; filter: drop-shadow(0 0 20px #a64dff); }
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <circle id="bg" cx="50" cy="50" r="45"/>
      <circle id="progress" cx="50" cy="50" r="45"/>
    </svg>
    <div id="time">50:00</div>
    <div class="button-group">
      <button id="playPauseBtn" onclick="toggleTimer()">▶</button>
      <button onclick="resetTimer()">⏹</button>
    </div>
  </div>

  <div class="controls">
    <label>Min: <input type="number" id="minutesInput" value="50" min="1"></label>
  </div>

<script>
  let duration = 50 * 60; // default 50 minutes
  let remaining = duration;
  let timer = null;
  let alarmInterval = null;
  let startTime = null;
  const progress = document.getElementById("progress");
  const timeDisplay = document.getElementById("time");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const circumference = 2 * Math.PI * 45;
  progress.style.strokeDasharray = circumference;

  function updateDisplay() {
    let minutes = Math.floor(remaining / 60);
    let seconds = remaining % 60;
    timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2,"0")}`;
    let offset = circumference - (remaining / duration) * circumference;
    progress.style.strokeDashoffset = offset;
  }

  function tick() {
    const now = Date.now();
    const elapsed = Math.floor((now - startTime) / 1000);
    remaining = Math.max(duration - elapsed, 0);
    updateDisplay();

    if (remaining <= 0) {
      triggerAlarm();
      clearInterval(timer);
      timer = null;
      playPauseBtn.textContent = "▶";
    }
  }

  function toggleTimer() {
    if (timer) {
      clearInterval(timer);
      timer = null;
      playPauseBtn.textContent = "▶";
    } else {
      // Adjust startTime so resume works correctly
      startTime = Date.now() - (duration - remaining) * 1000;
      timer = setInterval(tick, 1000);
      playPauseBtn.textContent = "⏸";
    }
  }

  function resetTimer() {
    clearInterval(timer);
    timer = null;
    clearInterval(alarmInterval);
    alarmInterval = null;
    timeDisplay.classList.remove("flash");
    progress.classList.remove("ring-flash");
    playPauseBtn.textContent = "▶";
    let minutes = parseInt(document.getElementById("minutesInput").value) || 50;
    duration = minutes * 60;
    remaining = duration;
    updateDisplay();
  }

  function triggerAlarm() {
    timeDisplay.classList.add("flash");
    progress.classList.add("ring-flash");
    playSound();
    alarmInterval = setInterval(playSound, 5000);
  }

  function playSound() {
    let alarm = new Audio("https://raw.githubusercontent.com/nottraumatized-sketch/pomodoraclock.github.io/refs/heads/main/f1%20radio.mp3");
    alarm.play().catch(e => console.log("Audio blocked"));
  }

  document.getElementById("minutesInput").addEventListener("input", () => {
    let minutes = parseInt(document.getElementById("minutesInput").value) || 50;
    duration = minutes * 60;
    remaining = duration;
    updateDisplay();
  });

  resetTimer();
</script>
</body>
</html>
